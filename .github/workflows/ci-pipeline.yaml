name: Monorepo CI Pipeline
on:
  push:
    branches:
      - main
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: goniusman

################################################################################
# DETECT CHANGES
################################################################################

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect Changed Services
        id: detect
        run: |
          SERVICES=()
          ALL_SERVICES=(
            auth
            book
            order
            notification
            review
          )
          for service in "${ALL_SERVICES[@]}"
          do
            if git diff --name-only \
              "${{ github.event.before }}" \
              "${{ github.sha }}" \
              | grep -q "^services/$service/"
            then
              SERVICES+=("\"$service\"")
            fi
          done
          JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -s -c .)
          if [ "$JSON" = "[]" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
          echo "services=$JSON" >> $GITHUB_OUTPUT
          echo "Changed services:"
          echo "$JSON"

################################################################################
# BUILD IMAGES
################################################################################

  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          # context: ./services/${{ matrix.service }}
          context: .
          file: ./services/${{ matrix.service }}/Dockerfile
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

################################################################################
# SINGLE GITOPS TRIGGER
################################################################################

  trigger-gitops:
    needs:
      - detect-changes
      - build-and-push
    if: |
      needs.detect-changes.outputs.changed == 'true' &&
      needs.build-and-push.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitOps
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITOPS_PAT }}
          repository: goniusman/GitOps
          event-type: update-images
          client-payload: |
            {
              "services": ["${{ needs.detect-changes.outputs.services }}"],
              "sha": "${{ github.sha }}"
            }