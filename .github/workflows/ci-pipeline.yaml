name: Monorepo CI Pipeline

on:
  push:
    branches: [main]
    # paths:
    #   - 'services/**'
    #   - '.github/workflows/ci-pipeline.yaml'

permissions:
  contents: read
  # contents: write
  # pull-requests: write

concurrency:
  group: monorepo-ci-${{ github.workflow }}-${{ github.ref }}
  # group: build-${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - auth
          - book
          - order
          - notification
          - user
          - review

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes for service
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "services/${{ matrix.service }}/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if not changed
        if: steps.changes.outputs.changed != 'true'
        run: echo "Skipping ${{ matrix.service }}"

      - name: Login to Docker Hub
        if: steps.changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: vars
        run: |
          echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
        
      - name: Debug tags
        run: |
          echo "FULL SHA: ${{ steps.vars.outputs.sha }}"
          echo "SHORT SHA: ${{ steps.vars.outputs.SHORT_SHA }}"  

      - name: Debug
        run: |
          echo "Docker user: ${{ secrets.DOCKERHUB_USERNAME }}"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ steps.vars.outputs.sha }}"


      # - name: Build and Push Image
      #   if: steps.changes.outputs.changed == 'true'
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: ./services/${{ matrix.service }}
      #     file: ./services/${{ matrix.service }}/Dockerfile
      #     push: true
      #     tags: |
      #       ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
      #       ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ steps.vars.outputs.sha }}


      - name: Build and Push Image
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true

          platforms: linux/amd64

          tags: |
            docker.io/goniusman/${{ matrix.service }}:${{ steps.vars.outputs.sha }}
            docker.io/goniusman/${{ matrix.service }}:latest
          provenance: false
          sbom: false

      - name: List build outputs (debug)
        run: |
          echo "Tags:"
          echo "${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest"
          echo "${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ steps.vars.outputs.sha }}"


      # ADD THIS STEP BELOW TO AUTOMATICALLY CLEAN UP OLD IMAGES
      - name: Clean up old Docker Hub tags (Keep Last 3)
        if: steps.changes.outputs.changed == 'true'
        env:
          USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
          REPO: ${{ matrix.service }}
        run: |
          echo "Authenticating with Docker Hub API..."

          TOKEN=$(curl -s -H "Content-Type: application/json" \
            -X POST \
            -d '{"username": "'"$USERNAME"'", "password": "'"$PASSWORD"'"}' \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "::error::Failed to authenticate"
            exit 1
          fi

          echo "Fetching tags..."

          curl -s -H "Authorization: JWT $TOKEN" \
            "https://hub.docker.com/v2/repositories/$USERNAME/$REPO/tags/?page_size=100&ordering=-last_updated" \
          | jq -r '
            .results
            | map(select(.name != "latest"))
            | sort_by(.last_updated)
            | reverse
            | .[3:]
            | .[].name
          ' \
          | while read -r TAG; do
              if [ -n "$TAG" ]; then
                echo "Deleting OLD tag: $TAG"
                curl -s -X DELETE \
                  -H "Authorization: JWT $TOKEN" \
                  "https://hub.docker.com/v2/repositories/$USERNAME/$REPO/tags/$TAG/"
              fi
          done
      
      
      # Trigger the GitOps Config Repo configuration update
      - name: Trigger GitOps CD Workflow
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITOPS_PAT }}
          repository: goniusman/GitOps  # Change this if your config repo has a different name
          event-type: update-image
          client-payload: '{"service": "${{ matrix.service }}", "sha": "${{ steps.vars.outputs.sha }}"}'





