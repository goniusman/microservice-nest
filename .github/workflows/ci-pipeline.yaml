name: Monorepo CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'services/**' # Trigger only when files inside the services directory change
      - '.github/workflows/ci-pipeline.yaml' # Triggers when updating this pipeline file itself

jobs:
  # JOB 1: Detect which specific microservice folders were modified
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      gateway: ${{ steps.filter.outputs.gateway }}
      auth: ${{ steps.filter.outputs.auth }}
      book: ${{ steps.filter.outputs.book }}
      order: ${{ steps.filter.outputs.order }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Paths Filter Engine
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            gateway: 'services/gateway/**'
            auth: 'services/auth/**'
            book: 'services/book/**'
            order: 'services/order/**'

  # JOB 2: Build and deploy the modified services
  build-and-deploy:
    needs: detect-changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # Prevents one microservice failure from breaking other running services
      matrix:
        include:
          - service_name: gateway
            enabled: ${{ needs.detect-changes.outputs.gateway }}
          - service_name: auth
            enabled: ${{ needs.detect-changes.outputs.auth }}
          - service_name: book
            enabled: ${{ needs.detect-changes.outputs.book }}
          - service_name: order
            enabled: ${{ needs.detect-changes.outputs.order }}

      steps:
      # If this specific service did not change, exit cleanly without error
      - name: Check if Execution is Required
        if: ${{ matrix.enabled != 'true' }}
        run: echo "No changes for ${{ matrix.service_name }}. Skipping."

      - name: Checkout Source Code
        if: ${{ matrix.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: ${{ matrix.enabled == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generates a reliable short 7-character Git commit hash string
      - name: Set Short SHA Output
        if: ${{ matrix.enabled == 'true' }}
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Container Image
        if: ${{ matrix.enabled == 'true' }}
        uses: docker/build-push-action@v6
        with:
          # Sets the context folder to the specific service subfolder
          context: ./services/${{ matrix.service_name }}
          file: ./services/${{ matrix.service_name }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service_name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service_name }}:sha-${{ steps.vars.outputs.sha_short }}

      - name: Checkout GitOps Deployment Repo
        if: ${{ matrix.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: '${{ github.repository_owner }}/bookverse-gitops'
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-repo

      # Replaces the old tag pattern safely using a specific, targeted line-matching rule
      - name: Write New Target Tag to values.yaml
        if: ${{ matrix.enabled == 'true' }}
        run: |
          cd gitops-repo/charts/bookverse-stack
          
          # Find the block starting with your service name, find the next 'tag:' statement, and overwrite it safely
          sed -i "/^${{ matrix.service_name }}:/,/^[^ ]/ s/tag: .*/tag: \"sha-${{ steps.vars.outputs.sha_short }}\"/" values.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add values.yaml
          git commit -m "chore(cd): auto-bump ${{ matrix.service_name }} image to sha-${{ steps.vars.outputs.sha_short }}"
          git push




















