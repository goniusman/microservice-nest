name: Monorepo CI Pipeline

on:
  push:
    branches: [main]
    # paths:
    #   - 'services/**'
    #   - '.github/workflows/ci-pipeline.yaml'

permissions:
  contents: read
  # contents: write
  # pull-requests: write

concurrency:
  group: monorepo-ci
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway
          - auth
          - book
          - order
          - notification

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes for service
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "services/${{ matrix.service }}/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if not changed
        if: steps.changes.outputs.changed != 'true'
        run: echo "Skipping ${{ matrix.service }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Debug
        run: |
          echo "Docker user: ${{ secrets.DOCKERHUB_USERNAME }}"
          echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}"

      - name: Login to Docker Hub
        if: steps.changes.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        if: steps.changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}

      - name: Clean up old Docker Hub tags
        if: steps.changes.outputs.changed == 'true'
        uses: chiselstrike/delete-old-docker-html-tags@v1.0.1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ matrix.service }}
          # Keeps the 'latest' tag safe from deletion
          ignore-tags: 'latest'
          # Keeps the 3 most recently pushed SHA/version tags
          keep-last: 3

      # Trigger the GitOps Config Repo configuration update
      - name: Trigger GitOps CD Workflow
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITOPS_PAT }}
          repository: goniusman/GitOps  # Change this if your config repo has a different name
          event-type: update-image
          client-payload: '{"service": "${{ matrix.service }}", "sha": "${{ github.sha }}"}'






