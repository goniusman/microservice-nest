name: Monorepo CI Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

################################################################################
# DETECT CHANGED SERVICES
################################################################################

  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      services: ${{ steps.changed.outputs.services }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changed
        run: |
          SERVICES=()

          for service in gateway auth book order notification user review
          do
            if git diff --name-only \
              ${{ github.event.before }} \
              ${{ github.sha }} \
              | grep -q "^services/$service/"
            then
              SERVICES+=("\"$service\"")
            fi
          done

          JSON=$(printf '%s\n' "${SERVICES[@]}" | jq -s -c .)

          echo "services=$JSON" >> $GITHUB_OUTPUT

          echo "Changed services:"
          echo $JSON

################################################################################
# BUILD IMAGES
################################################################################

  build-and-push:
    needs: detect-changes

    if: needs.detect-changes.outputs.services != '[]'

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:

      - uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile

          push: true

          platforms: linux/amd64

          tags: |
            docker.io/goniusman/${{ matrix.service }}:${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          provenance: false
          sbom: false

      - name: Save built service
        run: |
          mkdir output
          echo "${{ matrix.service }}" > output/service.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}
          path: output/service.txt

################################################################################
# TRIGGER GITOPS ONCE
################################################################################

  trigger-gitops:

    needs:
      - detect-changes
      - build-and-push

    runs-on: ubuntu-latest

    steps:

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build service list
        id: services
        run: |
          SERVICES=$(find artifacts -name service.txt \
            -exec cat {} \; \
            | jq -R . \
            | jq -s -c .)

          echo "services=$SERVICES" >> $GITHUB_OUTPUT

          echo $SERVICES

      - name: Trigger GitOps
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GITOPS_PAT }}
          repository: goniusman/GitOps

          event-type: update-images

          client-payload: >-
            {
              "services": ${{ steps.services.outputs.services }},
              "sha": "${{ github.sha }}"
            }