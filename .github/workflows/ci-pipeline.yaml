name: Monorepo CI/CD (GitOps Safe)

on:
  push:
    branches: [main]
    paths:
      - 'infra/helm/charts/templates/**'
      - 'services/**'
      - '.github/workflows/ci-pipeline.yaml'

concurrency:
  group: monorepo-ci-cd
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - gateway
          - auth
          - book
          - order
          - notification

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check if service changed
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            changed: '${{ matrix.service }}/**'

      - name: Skip if not changed
        if: steps.filter.outputs.changed != 'true'
        run: echo "No changes for ${{ matrix.service }}"

      - name: Log in to Docker Hub
        if: steps.filter.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Image
        if: steps.filter.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}


  gitops-update:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: org-name/microservice-nest
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops
          fetch-depth: 0

      - name: Verify repo access
        run: |
          cd gitops
          git status

      - name: Setup yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update values.yaml
        run: |
          cd gitops/infra/helm/charts
          yq e '.gateway.tag = "${{ github.sha }}"' -i values.yaml

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          path: gitops
          branch: gitops/update-${{ github.sha }}
          title: "chore: update images"
          commit-message: "update images [skip ci]"