apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bookverse
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/goniusman/microservice-nest'
    targetRevision: HEAD
    path: charts/bookverse
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: bookverse
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true