apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:

        - name: auth-service

          image: "{{ .Values.auth.image.repository }}:{{ .Values.auth.image.tag }}"

          ports:
            - containerPort: 3001

          envFrom:
            - configMapRef:
                name: app-config

            - secretRef:
                name: app-secrets

          readinessProbe:
            httpGet:
              path: /health/ready
              port: 3001

          livenessProbe:
            httpGet:
              path: /health/live
              port: 3001

          resources:
            requests:
              cpu: 100m
              memory: 128Mi

            limits:
              cpu: 500m
              memory: 512Mi