apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: {{ .Values.gateway.replicaCount }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.gateway.service.port }}

          envFrom:
            - configMapRef:
                name: app-config

            - secretRef:
                name: app-secrets

          # readinessProbe:
          #   httpGet:
          #     path: /health/ready
          #     port: 3000

          # livenessProbe:
          #   httpGet:
          #     path: /health/live
          #     port: 3000

          resources:
            requests:
              cpu: 100m
              memory: 128Mi

            limits:
              cpu: 500m
              memory: 512Mi