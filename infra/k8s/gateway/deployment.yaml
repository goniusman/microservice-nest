apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: bookverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: gateway-config
            - configMapRef:
                name: app-config
            - secretRef:
                name: gateway-secrets
            - secretRef:
                name: app-secrets
          # env:
          #   - name: AUTH_SERVICE_URL
          #     value: "http://auth:3001"
          #   - name: BOOK_SERVICE_URL
          #     value: "http://book:3002"
          #   - name: ORDER_SERVICE_URL
          #     value: "http://order:3003"