apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: bookverse
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp          # Labeling the port makes your YAML cleaner
      port: 5672
      targetPort: 5672
    - name: management    # Named port for the web dashboard
      port: 15672
      targetPort: 15672
  type: NodePort          # Allows you to browse the dashboard easily