apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: bookverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: auth:latest
          imagePullPolicy: Never
          # readinessProbe:
          #   httpGet:
          #     path: /health/ready
          #     port: 3001

          # livenessProbe:
          #   httpGet:
          #     path: /health/live
          #     port: 3001

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: auth-config
            - configMapRef:
                name: app-config
            - secretRef:
                name: auth-secrets
            - secretRef:
                name: app-secrets

          # env:
          #   - name: DB_HOST
          #     value: "postgres"
          #   - name: DB_NAME
          #     value: "bookverse_auth"