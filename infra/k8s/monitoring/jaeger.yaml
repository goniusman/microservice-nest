apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: bookverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.57
          ports:
            - containerPort: 16686 # Jaeger Web UI Port
            - containerPort: 4317  # OTLP gRPC Receiver (Where apps send traces)
            - containerPort: 4318  # OTLP HTTP Receiver





---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: bookverse
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
  type: ClusterIP