apiVersion: apps/v1
kind: Deployment
metadata:
  name: book
  namespace: bookverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book
  template:
    metadata:
      labels:
        app: book
    spec:
      containers:
        - name: book
          image: book:latest
          imagePullPolicy: Never
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: book-config
            - configMapRef:
                name: app-config
            - secretRef:
                name: book-secrets
            - secretRef:
                name: app-secrets
          # env:
          #   - name: MONGO_URL
          #     value: "mongodb://mongodb:27017/bookverse_books"