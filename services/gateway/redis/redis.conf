# Listen on all interfaces (Docker-safe)
bind 0.0.0.0

# Disable protected mode (Docker-safe)
protected-mode no

# Save DB every 60s if at least 1 key changed
save 60 1

# Log level
loglevel warning

# Enable AOF for durability (optional but recommended)
appendonly yes

# ---- REPLICATION ----
# Make sure Redis acts as a MASTER (these lines ensure it's NOT a replica)
# Do NOT include replicaof/slaveof
# slaveof <host> <port>   <-- Do NOT add this!
# replicaof <host> <port> <-- Do NOT add this!

# ---- SECURITY ----
# Optional: Require password (commented for now)
# requirepass YourStrongPasswordHere
